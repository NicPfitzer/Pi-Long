Weights:
  Pi3: './weights/model.safetensors'
  DBoW: './weights/ORBvoc.txt'
  SALAD: './weights/dino_salad.ckpt'
  DNIO: './weights/dinov2_vitb14_pretrain.pth'

Model:
  chunk_size: 60
  overlap: 30
  loop_chunk_size: 20 # imgs of loop chunk = 2 * loop_chunk_size
  loop_enable: True
  useDBoW: False
  delete_temp_files: True
  align_method: 'numba' # 'numba' or 'numpy', use 'numba' would be faster

  IRLS:
    delta: 0.1
    max_iters: 5
    tol: 1e-9

  Pointcloud_Save:
    sample_ratio: 0.015
    conf_threshold_coef: 0.65 # conf_threshold = np.mean(confs) * conf_threshold_coef

Loop:
  DBoW:
    thresh: 0.034
    num_repeat: 3
    NMS: 25

  SALAD:
    image_size: [336, 336]
    batch_size: 32
    similarity_threshold: 0.7
    top_k: 5
    use_nms: True
    nms_threshold: 25

  SIM3_Optimizer:
    lang_version: 'cpp' 
    # choose between 'cpp' or 'python'. will auto set 'python' if c++ version has not installed
    max_iterations: 30
    lambda_init: 1e-6

Segmentation:
  enable: True
  prompt: "tree. electric pole. building. road."
  sam2_checkpoint: "./checkpoints/sam2.1_hiera_large.pt"
  sam2_config: "configs/sam2.1/sam2.1_hiera_l.yaml"
  grounding_dino_model_id: "rziga/mm_grounding_dino_large_all"
  device: null
  box_threshold: 0.2
  text_threshold: 0.2
  box_shrink_ratio: 1.0
  morph_kernel: 0
  min_mask_area: 200
  max_points_per_label: 300000
  confidence_threshold: null
  no_merged_cloud: False
  clustering:
    enable: True
    eps: 0.4
    min_samples: 30
    min_cluster_points: 500
    voxel_size: 0.05
    max_instances_per_label: null
